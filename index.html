<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bonne Saint-Valentin !!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="opening-screen" id="openingScreen">
        <div class="love-effect">
        </div>
        <h1>Entre ton prénom</h1>
        <input type="text" id="crushName" placeholder="Écris ton prénom ici..." />
        <button id="startButton">Commencer</button>
    </div>

    <div class="container" id="mainContent" style="display: none;">
        <h1 class="animated-text">Happy birthday my love, <span id="displayName"></span> ! 💖</h1>
        <div class="heart" id="heart"></div>
        <div id="messageContainer"></div> 
        <button id="nextPageButton">Surprise 🌸</button> 
    </div>

    <script src="script.js"></script>
</body>
</html>
